name: CI - Build CUDA Wheels

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  cuda-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: ubuntu-latest
          #   arch: amd64
          - os: ubuntu-22.04-arm
            arch: arm64
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build wheel in Docker (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          cd kv_connectors/llmd_fs_backend
          DOCKER_BUILDKIT=1 docker build \
            --build-arg CUDA_VERSION=12.8.0 \
            --build-arg torch_cuda_arch_list='8.7 8.9 9.0 10.0+PTX' \
            --build-arg max_jobs=4 \
            --tag llmd-fs-backend:build \
            --target build \
            --progress plain \
            -f Dockerfile.wheel .
          mkdir -p wheels
          docker run --rm -v $(pwd)/wheels:/artifacts_host llmd-fs-backend:build \
            bash -c 'cp -r dist/* /artifacts_host/ && chmod -R a+rw /artifacts_host'
          ls -lh wheels/

      - name: Upload wheels as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuda-wheels-${{ matrix.arch }}
          path: kv_connectors/llmd_fs_backend/wheels/*.whl





      - name: Build wheel natively (AMD64)
        if: matrix.arch == 'amd64'
        run: |
          # For AMD64, build natively (faster)
          cd kv_connectors/llmd_fs_backend
          python3 -m pip install --upgrade pip setuptools wheel ninja numpy
          python3 -m pip install torch==2.9.1
          export CUDA_HOME=/usr/local/cuda
          export TORCH_CUDA_ARCH_LIST='7.0;7.5;8.0;8.6;8.9;9.0+PTX'
          rm -rf build dist *.egg-info wheels
          mkdir -p wheels
          python3 setup.py bdist_wheel -d wheels
          ls -lh wheels/

      - name: Upload wheels as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuda-wheels-${{ matrix.arch }}
          path: kv_connectors/llmd_fs_backend/wheels/*.whl
